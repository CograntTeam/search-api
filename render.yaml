# Render Blueprint — see https://render.com/docs/blueprint-spec
# Deploy: push to main, then Render -> New Blueprint -> select this repo.
# All secrets must be set manually in the service's Environment tab after deploy.
services:
  - type: web
    name: cogrant-search-api
    runtime: python
    region: frankfurt  # change if you prefer another EU region
    plan: starter
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: API_BASE_URL
        value: https://api.cogrant.eu
      # --- Secrets — set these manually in the Render dashboard ---
      - key: AIRTABLE_PAT
        sync: false
      - key: AIRTABLE_BASE_ID
        value: apphC0wbp5dYfACfb
      - key: AIRTABLE_API_KEYS_TABLE_ID
        value: tblfXzQKso559HNlQ
      - key: AIRTABLE_API_JOBS_TABLE_ID
        value: tbl5QazdvtAVbAHZO
      - key: AIRTABLE_SEARCH_MATCHES_TABLE_ID
        value: tblLPLC7MfX7nuxyr
      - key: AIRTABLE_COMPANIES_TABLE_ID
        value: tblelf4Z6wnpDKr5K
      - key: AIRTABLE_GRANTS_TABLE_ID
        value: tblnRV4RxCOv7X5u6
      - key: N8N_WEBHOOK_BASE_URL
        sync: false
      - key: INTERNAL_SHARED_SECRET
        generateValue: true
      # --- Reverse search + daily notifications ---
      - key: SCHEDULER_ENABLED
        value: "true"
      - key: SCHEDULER_TIMEZONE
        value: Europe/Vilnius
      - key: GEMINI_MODEL
        value: gemini-3.5-flash
      - key: GEMINI_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: info@cogrant.eu
      - key: EMAIL_REPLY_TO
        value: info@cogrant.eu
      - key: EMAIL_BCC
        value: info@cogrant.eu
      # Google Workspace SMTP app password for info@cogrant.eu
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
